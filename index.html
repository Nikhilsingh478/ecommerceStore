<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftCart</title>
    <meta name="theme-color" content="#16a34a" />
    <link rel="icon" type="image/png" href="/shopping-cart.png" />
    <link rel="apple-touch-icon" href="/shopping-cart.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="description" content="SwiftCart - Order groceries and daily essentials online. Fast delivery, best prices." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SwiftCart" />

    <meta property="og:title" content="SwiftCart" />
    <meta property="og:description" content="Order groceries and daily essentials online." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/shopping-cart.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SwiftCart" />
    <meta name="twitter:image" content="/shopping-cart.png" />

    <style>
      #pre-splash {
        position: fixed;
        inset: 0;
        z-index: 99998;
        background: linear-gradient(160deg, #f0fdf4 0%, #ffffff 50%, #f0f9ff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        transition: opacity 0.35s ease;
      }
      #pre-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #pre-splash .icon-wrap {
        width: 96px;
        height: 96px;
        border-radius: 28px;
        background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 60px rgba(22,163,74,0.35), 0 4px 16px rgba(22,163,74,0.2);
        animation: ps-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      #pre-splash .wordmark {
        margin-top: 24px;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0f172a;
        line-height: 1.1;
        animation: ps-fadein 0.5s ease 0.15s both;
      }
      #pre-splash .wordmark span { color: #16a34a; }
      #pre-splash .tagline {
        margin-top: 8px;
        font-size: 14px;
        color: #64748b;
        font-weight: 500;
        letter-spacing: 0.01em;
        animation: ps-fadein 0.5s ease 0.3s both;
      }
      @keyframes ps-pop {
        from { transform: scale(0.7); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes ps-fadein {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>

  <body>
    <div id="pre-splash">
      <div class="icon-wrap">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1"/>
          <circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
        </svg>
      </div>
      <div class="wordmark">Swift<span>Cart</span></div>
      <div class="tagline">Your daily essentials, delivered fast</div>
    </div>

    <div id="root"></div>
    <script>
      (function() {
        var splash = document.getElementById('pre-splash');
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').children.length > 0) {
            splash.classList.add('hide');
            setTimeout(function() { splash.remove(); }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
