<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftCart</title>
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect to speed up font & image origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Load Inter font asynchronously — non-render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" /></noscript>
    <meta name="description" content="SwiftCart - Order groceries and daily essentials online. Fast delivery, best prices." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SwiftCart" />

    <meta property="og:title" content="SwiftCart" />
    <meta property="og:description" content="Order groceries and daily essentials online." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SwiftCart" />
    <meta name="twitter:image" content="/icon-512.png" />

    <style>
      #pre-splash {
        position: fixed;
        inset: 0;
        z-index: 99998;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        transition: opacity 0.35s ease;
      }
      #pre-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #pre-splash .icon-wrap {
        width: 100px;
        height: 100px;
        border-radius: 28px;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: ps-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      #pre-splash .wordmark {
        margin-top: 24px;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #000000;
        line-height: 1.1;
        animation: ps-fadein 0.45s ease 0.15s both;
      }
      #pre-splash .wordmark span {
        color: #555555;
      }
      #pre-splash .tagline {
        margin-top: 8px;
        font-size: 14px;
        color: #888888;
        font-weight: 500;
        letter-spacing: 0.01em;
        animation: ps-fadein 0.45s ease 0.3s both;
      }
      #pre-splash .dots {
        position: absolute;
        bottom: 52px;
        display: flex;
        gap: 8px;
        animation: ps-fadein 0.45s ease 0.4s both;
      }
      #pre-splash .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #000000;
        animation: ps-pulse 1.2s ease-in-out infinite;
      }
      #pre-splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #pre-splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes ps-pop {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      @keyframes ps-fadein {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
      @keyframes ps-pulse {
        0%, 100% { opacity: 0.25; transform: scale(0.8); }
        50%       { opacity: 1;    transform: scale(1);   }
      }
    </style>
  </head>

  <body>
    <div id="pre-splash">
      <div class="icon-wrap">
        <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1"/>
          <circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
        </svg>
      </div>
      <div class="wordmark">Swift<span>Cart</span></div>
      <div class="tagline">Your daily essentials, delivered fast</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script>
      (function() {
        var splash = document.getElementById('pre-splash');
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').children.length > 0) {
            splash.classList.add('hide');
            setTimeout(function() { splash.remove(); }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
